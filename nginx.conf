# =============================================================================
#  Config PRINCIPAL de Nginx (reemplaza /etc/nginx/nginx.conf).
#  Es "main config" y no solo un server block porque un proceso non-root
#  necesita controlar dónde escribe el pid y los directorios temporales.
# =============================================================================

# Sin 'user nginx;' -> un proceso non-root no puede hacer setuid; el master ya
# corre como 'nginx' gracias al USER del Dockerfile.
worker_processes auto;

# pid en ruta escribible por el usuario non-root.
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Directorios temporales reubicados a /tmp (escribibles sin privilegios).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # No filtrar versión de Nginx en headers ni páginas de error (menos fingerprinting).
    server_tokens off;

    # Compresión: reduce el peso de JS/CSS/SVG servidos al navegador.
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript application/xml application/xml+rss
                      image/svg+xml font/ttf font/otf;

    # Sirve los .gz precomprimidos por vite-plugin-compression (no recomprime en
    # cada request; si el .gz no existe, cae al gzip dinámico de arriba).
    gzip_static       on;

    # Logs a stdout/stderr (patrón 12-factor; los recoge el runtime del contenedor).
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # --- Cache-Control calculado por ruta -------------------------------------
    # Usamos un 'map' para NO tener que poner 'add_header Cache-Control' dentro de
    # los location hijos. Motivo: en Nginx, si un location declara SU PROPIO
    # add_header, se CANCELA la herencia de TODOS los add_header del nivel padre
    # (incluidas las cabeceras de seguridad). Manteniendo todos los add_header en
    # el nivel 'server' evitamos ese bug de herencia.
    map $uri $cache_control {
        default            "no-cache";                                  # index.html y demás
        ~*^/assets/        "public, max-age=31536000, immutable";       # assets con hash de Vite
    }

    server {
        listen      8080;          # puerto no privilegiado (>1024)
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # --- Cabeceras (TODAS a nivel server -> herencia consistente) ------
        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header X-Frame-Options          "SAMEORIGIN"                       always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
        # CSP: ajústala si integras CDNs/analytics. El JS de Vite va como ficheros
        # externos (no inline) -> script-src 'self' basta. 'unsafe-inline' en
        # style-src cubre estilos inyectados. Añade tu API a connect-src
        # (ej. connect-src 'self' https://api.tudominio.com).
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;
        add_header Cache-Control             $cache_control                     always;

        # --- API: reverse-proxy al backend (mismo EC2, red Docker 'web') --
        # El backend corre como contenedor 'backend' en la red compartida y NO
        # se publica al host. El navegador llama a /api (mismo origen) -> cero
        # CORS y cero mixed-content. VITE_API_URL debe valer "/api".
        # Usamos resolver + variable para que Nginx ARRANQUE aunque el backend
        # esté temporalmente caído (con upstream estático fallaría al iniciar).
        location /api/ {
            resolver 127.0.0.11 valid=10s;            # DNS embebido de Docker
            set $backend_upstream "http://backend:3000";
            proxy_pass $backend_upstream$request_uri;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
        }

        # --- Assets con hash de contenido de Vite -------------------------
        # try_files =404 evita que un asset faltante caiga al fallback SPA
        # (serviría index.html con Content-Type erróneo).
        location /assets/ {
            try_files $uri =404;
            access_log off;
        }

        # --- Fallback SPA (React Router) ----------------------------------
        # Cualquier ruta desconocida devuelve index.html para que el router
        # del cliente resuelva la navegación (evita 404 en /ruta-profunda).
        location / {
            try_files $uri $uri/ /index.html;
        }

        # No exponer archivos ocultos (.git, .env, .htaccess, etc.).
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
