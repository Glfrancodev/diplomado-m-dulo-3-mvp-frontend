# CI en PR/push + CD: build imagen → Docker Hub → deploy contenedor en EC2.
name: Frontend CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  IMAGE_NAME: phoenix-frontend

jobs:
  ci:
    name: CI (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: npm run test --if-present

      - name: Build de producción (verifica que compile)
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  docker:
    name: Build & push imagen (Docker Hub)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      # Solo el tag (SHA). NO incluir username en outputs: GitHub vacía outputs que contienen secrets.
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tags de imagen
        id: meta
        run: |
          TAG="${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD (contenedor en EC2)
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
    steps:
      - name: Deploy por SSH (docker pull + run)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG
          script: |
            set -euo pipefail

            IMAGE="${DOCKERHUB_USERNAME}/phoenix-frontend:${IMAGE_TAG}"
            echo "Desplegando imagen: ${DOCKERHUB_USERNAME}/phoenix-frontend:${IMAGE_TAG}"

            if [ -z "${IMAGE_TAG}" ]; then
              echo "ERROR: IMAGE_TAG vacío"
              exit 1
            fi

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker pull "$IMAGE"

            docker stop phoenix-frontend 2>/dev/null || true
            docker rm phoenix-frontend 2>/dev/null || true

            docker run -d \
              --name phoenix-frontend \
              --restart unless-stopped \
              -p 80:8080 \
              "$IMAGE"

            docker image prune -f
